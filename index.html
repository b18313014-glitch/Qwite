<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwit Terminal App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #05070a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }
        
        /* Плавное переключение экранов */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            padding: 20px;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* Кнопка Яндекса */
        .btn-yandex {
            background-color: #ffcc00; color: #000; border: none;
            padding: 18px 36px; font-size: 20px; font-weight: bold;
            cursor: pointer; border-radius: 6px; margin-top: 20px;
            font-family: sans-serif; transition: transform 0.2s;
        }
        .btn-yandex:active { transform: scale(0.95); }

        /* Рекламный экран */
        .promo-text { font-size: 36px; font-weight: bold; text-align: center; min-height: 50px; }

        /* Выбор оплаты */
        .pay-options { display: flex; gap: 40px; margin-top: 30px; }
        .pay-btn {
            border: 2px solid #00ff66; background: transparent; color: #00ff66;
            padding: 20px 40px; font-size: 22px; cursor: pointer; transition: all 0.3s;
        }
        .pay-btn:hover { background: #00ff66; color: #000; }
        .hidden { display: none !important; }

        /* Анимация БУМ! и вылет карты */
        .card-container { position: relative; width: 340px; height: 210px; perspective: 1000px; margin-top: 30px; }
        .bank-card {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; color: white; display: flex; flex-direction: column;
            justify-content: space-between; box-shadow: 0 0 30px rgba(0,255,102,0.3);
            transform: scale(0) rotateY(-180deg);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bank-card.boom { transform: scale(1) rotateY(0deg); }
        .card-system { align-self: flex-end; font-weight: bold; font-style: italic; font-size: 26px; color: #ffaa00; }

        /* Ошибки и статусы */
        .status-msg { font-size: 28px; text-align: center; margin-bottom: 10px; }
        .error-text { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.5); }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <h2>ДОСТУП ОГРАНИЧЕН</h2>
        <p>Для активации terminal выполните вход.</p>
        <button class="btn-yandex" onclick="loginWithYandex()">Войти с Яндекс ID</button>
    </div>

    <div id="idle-screen" class="screen">
        <div class="promo-text" id="promo-ticker">ЗАГРУЗКА РЕКЛАМЫ...</div>
        <button style="margin-top: 40px; background: transparent; color: #555; border: 1px solid #555;" onclick="triggerPaymentCommand()">[Тест: Прилетела команда оплаты]</button>
    </div>

    <div id="payment-screen" class="screen">
        <h2>ВЫ МОЖЕТЕ ОПЛАТИТЬ КАРТОЙ ИЛИ БИОМЕТРИЕЙ</h2>
        <div class="pay-options" id="options-block">
            <button class="pay-btn" onclick="selectPayment('card')">КАРТОЙ</button>
            <button class="pay-btn" onclick="selectPayment('bio')">БИОМЕТРИЕЙ</button>
        </div>
        <div id="card-waiting-msg" class="hidden" style="margin-top: 20px; text-align: center;">
            <h3>ПРИЛОЖИТЕ КАРТУ К ТЕРМИНАЛУ...</h3>
        </div>
    </div>

    <div id="status-screen" class="screen">
        <div id="status-title" class="status-msg">ОБРАБОТКА...</div>
        <div class="card-container">
            <div id="virtual-card" class="bank-card">
                <div style="font-size: 18px; letter-spacing: 2px;">**** **** **** ****</div>
                <div id="card-brand" class="card-system">MIR</div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Supabase
        const supabase = supabase.createClient("https://tjmavzfleliaqanyxkjs.supabase.co", "ТВОЙ_ANON_KEY");

        const promoStrings = [
            "У НАС МНОГО СКИДОК!",
            "СОТРУДНИЧАЕМ СО ВСЕМИ БАНКАМИ!",
            "ВСЁ САМОЕ КРУТОЕ — ТОЛЬКО У НАС!"
        ];
        let promoIndex = 0;
        let promoInterval;

        // ПРОВЕРКА ИДЕНТИФИКАЦИОННОГО ТОКЕНА ЯНДЕКСА
        async function checkTerminalSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Идентификация пройдена — включаем систему и нативный NFC
                startTerminalMode();
            } else {
                // Токена нет — блокируем интерфейс экраном логина
                changeScreen('auth-screen');
            }
        }

        // Авторизация через кастомный провайдер Яндекса
        async function loginWithYandex() {
            await supabase.auth.signInWithOAuth({
                provider: 'custom',
                options: {
                    targetProvider: 'yandex',
                    redirectTo: 'https://www.terminal-qwit.duckdns.org/'
                }
            });
        }

        function startTerminalMode() {
            changeScreen('idle-screen');
            initNativeNfc(); // Запускаем прослушивание железной антенны
            
            document.getElementById('promo-ticker').innerText = promoStrings[promoIndex];
            promoInterval = setInterval(() => {
                promoIndex = (promoIndex + 1) % promoStrings.length;
                document.getElementById('promo-ticker').innerText = promoStrings[promoIndex];
            }, 4000);
        }

        // Перевод приложения в режим ожидания оплаты (по внешней команде)
        function triggerPaymentCommand() {
            changeScreen('payment-screen');
            document.getElementById('options-block').classList.remove('hidden');
            document.getElementById('card-waiting-msg').classList.add('hidden');
        }

        function selectPayment(type) {
            if (type === 'card') {
                // Медленно убираем биометрию, ждем касания чипа карты
                document.getElementById('options-block').classList.add('hidden');
                document.getElementById('card-waiting-msg').classList.remove('hidden');
            }
        }

        // НАПРАВЛЕННАЯ СИСТЕМНАЯ РАБОТА С ФИЗИЧЕСКИМ ЧИПОМ КАРТЫ
        async function handleCardTap(cardUid, cardType) {
            try {
                // Если данные с антенны не пришли или чтение прервалось
                if (!cardUid || !cardType) {
                    throw new Error("CardReadError");
                }

                // Успешно: Анимация БУМ! Карточка вылетает на экране приложения
                changeScreen('status-screen');
                document.getElementById('status-title').className = "status-msg";
                document.getElementById('status-title').innerText = "ПРИНЯТО";
                document.getElementById('card-brand').innerText = cardType;
                document.getElementById('virtual-card').classList.add('boom');

                // Ищем ячейку этой карты в таблице Supabase
                let { data: account } = await supabase
                    .from('virtual_cards')
                    .select('*')
                    .eq('card_uid', cardUid)
                    .single();

                if (!account) {
                    // ПЕРВОЕ ПРИКЛАДЫВАНИЕ: Создаем внутренний аккаунт банка с балансом 0
                    await supabase.from('virtual_cards').insert([{ card_uid: cardUid, card_type: cardType, balance: 0 }]);
                    setTimeout(() => {
                        document.getElementById('status-title').innerText = "СТРАНИЦА СОЗДАНА";
                    }, 1200);
                } else {
                    // ПОВТОРНОЕ ПРИКЛАДЫВАНИЕ: Денег нет, выводим ошибку баланса
                    setTimeout(() => {
                        document.getElementById('status-title').className = "status-msg error-text";
                        document.getElementById('status-title').innerText = "НЕДОСТАТОЧНО СРЕДСТВ";
                    }, 1200);
                }

            } catch (error) {
                // КРИТИЧЕСКАЯ ОШИБКА ЧТЕНИЯ АНТЕННЫ
                changeScreen('status-screen');
                document.getElementById('virtual-card').classList.remove('boom');
                document.getElementById('status-title').className = "status-msg error-text";
                document.getElementById('status-title').innerText = "Ошибка чтения карты. Попробуйте еще раз";
                
                // Даём вторую попытку: возвращаем экран ожидания карты через 4 секунды
                setTimeout(() => {
                    triggerPaymentCommand();
                }, 4000);
            }
        }

        // СВЯЗУЮЩИЙ МОСТ МЕЖДУ НАШИМ ПРИЛОЖЕНИЕМ И ЖЕЛЕЗОМ (NFC-АНТЕННОЙ)
        function initNativeNfc() {
            if (window.AndroidNFC) {
                // Регистрируем прямой системный обработчик касания
                window.AndroidNFC.onTagDiscovered((payload) => {
                    // Передаем физический UID и считанную платежную систему напрямую в JS
                    handleCardTap(payload.uid, payload.type);
                });
            } else {
                // Если приложение только запускается, ищем антенну каждые полсекунды
                setTimeout(initNativeNfc, 500);
            }
        }

        // Точка старта всего интерфейса приложения
        checkTerminalSession();
    </script>
</body>
</html>
